<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #825CFF;
      --primary-hover: #6a45e6;
      --error-color: #ff4d4d;
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Poppins', sans-serif;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 380px;
      width: 90%;
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 { margin-bottom: 25px; color: #333; }

    /* Error Alert Styling */
    #error-box {
      display: none;
      background: #ffebee;
      color: var(--error-color);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      border: 1px solid #ffcdd2;
    }

    .form-control {
      text-align: left;
      margin-bottom: 18px;
      position: relative;
    }

    .form-control label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
    }

    .form-control input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .form-control input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    /* Eye Icon Styling */
    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      display: flex;
      align-items: center;
      color: #777;
    }

    .toggle-password:hover { color: var(--primary-color); }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

    .links-container { margin-top: 20px; font-size: 13px; }
    .links-container a { color: var(--primary-color); text-decoration: none; display: block; margin-top: 8px; }
    .links-container a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Login</h1>
    
    <div id="error-box"></div>

    <form id="login-form">
      <div class="form-control">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>

      <div class="form-control">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
          <span class="toggle-password" id="eye-icon">
            <svg id="eye-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </span>
        </div>
      </div>

      <button type="submit" class="btn">Sign In</button>
      
      <div class="links-container">
        <a href="#">Forgot Password?</a>
        <a href="register.html">Don't have an account? <b>Register</b></a>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');
    const eyeSvg = document.getElementById('eye-svg');
    const errorBox = document.getElementById('error-box');

    // 1. Password Visibility Toggle
    eyeIcon.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Update icon visual (optional: strike-through eye)
      if (type === 'text') {
        eyeSvg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        eyeSvg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    });

    // 2. Form Submission & Error Handling
    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none'; // Clear old errors

      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        showError('Please fill in all fields.');
        return;
      }

      try {
        const response = await fetch("http://localhost:8080/ExpTrack/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.message || "Invalid login credentials.");
          return;
        }

        localStorage.setItem("user", data.username);
        window.location.href = "expense_tracker.html";

      } catch (error) {
        showError("Connection failed. Is the server running?");
      }
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
