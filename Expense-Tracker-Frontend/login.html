<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <div class="container narrow">
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Sign in to continue tracking your expenses.</p>

      <form class="form" id="login-form">
        <div class="form-control">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="form-control">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="login-btn">Login</button>
        <a href="#" class="link forgot-password">Forgot Password?</a>
        <a href="register.html" class="link subtle">Don’t have an account? Register</a>
      </form>
    </div>
  </main>

  <script>
    const storedUser = localStorage.getItem("user");
    if (storedUser) {
      // If logged in
      window.location.href = "expense_tracker.html"; // redirected
    }

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('Please enter both username and password.');
        return;
      }

      const user = { username, password };

      try {
        const response = await fetch("http://localhost:8080/ExpTrack/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(user)
        });

        if (!response.ok) {
          const errorData = await response.json();
          alert(errorData.message); // Backend sends plain error
          return;
        }

        const data = await response.json();
        console.log(data.username);
        localStorage.setItem("user", data.username);
        window.location.href = "expense_tracker.html"; // redirected

      }
      catch (error) {
        alert("Request failed: " + error.message);
      }

    });
  </script>
</body>

</html>
