<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <div class="container narrow">
      <h1 class="title">Create your account</h1>
      <p class="subtitle">Register to start tracking income and expenses.</p>

      <div class="form">
        <form id="form">
          <div class="form-control">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
          </div>
          <div class="form-control">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
          </div>
          <div class="form-control">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
          </div>
          <div class="form-control">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm your password" autocomplete="new-password">
          </div>
          <button type="button" class="btn" id="register-btn">Register</button>
          <a href="login.html" class="link subtle">Already have an account? Login</a>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('register-btn').addEventListener('click', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();

      if (!username || !email || !password || !confirmPassword) {
        alert('Please fill in all fields.');
        return;
      }

      if (password !== confirmPassword) {
        alert('Passwords do not match.');
        return;
      }

      const user = { username, email, password };

      try {
        const response = await fetch("http://localhost:8080/ExpTrack/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(user)
        });

        if (!response.ok) {
          const errorData = await response.text();
          alert("Error: " + errorData); // Backend sends plain error
          return;
        }

        const data = await response.json();
        alert("Registration successful for: " + data.username);
        window.location.href = 'login.html';

        // Optionally redirect or clear form
        document.getElementById("form").reset();
        //form.reset();

      } catch (error) {
        alert("Request failed: " + error.message);
      }

    });
  </script>
</body>

</html>
